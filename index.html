<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Today's Words</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
      background: #f9f9f9;
    }
    .phrase-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
      max-width: 500px;
      margin: 20px auto;
    }
    .phrase {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    .book {
      font-size: 1.1rem;
      color: #555;
    }
    img.cover {
      max-width: 100%;
      border-radius: 6px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>Today's Words</h1>
  <div id="phrase-container" class="phrase-card">
    <div class="phrase">読み込み中...</div>
    <div class="book"></div>
    <img class="cover" src="" alt="" style="display:none;">
  </div>

  <script>
    // あなたの GAS Webアプリ URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxgAgU-eGGnxih0eGjPz22EIX1NQddgnAFsbzDOfcyfx6V-dYXiDDmEsPqT3WV0bkyTfA/exec";

    async function loadRandomPhrase() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();

        if (!data || data.length === 0) {
          document.querySelector(".phrase").textContent = "フレーズがありません";
          return;
        }

        // ランダムで1件抽出
        const randomItem = data[Math.floor(Math.random() * data.length)];

        document.querySelector(".phrase").textContent = randomItem.phrase;
        document.querySelector(".book").textContent = `${randomItem.book} / ${randomItem.author}`;

        if(randomItem.cover) {
          const img = document.querySelector(".cover");
          img.src = randomItem.cover;
          img.style.display = "block";
        }

      } catch (err) {
        console.error(err);
        document.querySelector(".phrase").textContent = "読み込みに失敗しました";
      }
    }

    loadRandomPhrase();
  </script>
</body>
</html>
