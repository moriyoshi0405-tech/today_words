<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Today's Words</title>
  <style>
    body {
      font-family: 'Helvetica Neue', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .phrase-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 40px 30px;
      max-width: 400px;
      text-align: center;
      transition: transform 0.2s;
    }

    .phrase-card:hover {
      transform: translateY(-5px);
    }

    .phrase {
      font-size: 1.7rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .book {
      font-size: 1rem;
      color: #777;
      margin-bottom: 20px;
    }

    img.cover {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

  <div class="phrase-card">
    <div class="phrase">読み込み中...</div>
    <div class="book"></div>
    <img class="cover" src="" alt="" style="display:none;">
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxgAgU-eGGnxih0eGjPz22EIX1NQddgnAFsbzDOfcyfx6V-dYXiDDmEsPqT3WV0bkyTfA/exec";

    async function loadRandomPhrase() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();

        if (!data || data.length === 0) {
          document.querySelector(".phrase").textContent = "フレーズがありません";
          return;
        }

        // ランダムで1件抽出
        const randomItem = data[Math.floor(Math.random() * data.length)];

        document.querySelector(".phrase").textContent = randomItem.phrase;
        document.querySelector(".book").textContent = `${randomItem.book} / ${randomItem.author}`;

        if(randomItem.cover) {
          const img = document.querySelector(".cover");
          img.src = randomItem.cover;
          img.style.display = "block";
        }

      } catch (err) {
        console.error(err);
        document.querySelector(".phrase").textContent = "読み込みに失敗しました";
      }
    }

    loadRandomPhrase();
  </script>
</body>
</html>
