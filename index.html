<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Reading Reel</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* 背景 */

.background{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(35px) brightness(0.35);
transform:scale(1.2);
}

/* リール */

.reel{
position:relative;
width:340px;
height:620px;
border-radius:28px;
overflow:hidden;
box-shadow:0 25px 80px rgba(0,0,0,0.6);
}

/* 表紙 */

.cover{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
animation:zoom 20s ease-in-out infinite alternate;
filter:brightness(0.65);
}

@keyframes zoom{
0%{transform:scale(1)}
100%{transform:scale(1.15)}
}

/* グラデーション */

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(0,0,0,0.8),
rgba(0,0,0,0.3),
rgba(0,0,0,0.2)
);
}

/* テキスト */

.text{
position:absolute;
bottom:120px;
left:28px;
right:28px;
color:white;
}

.phrase{
font-family:'Noto Serif JP',serif;
font-size:1.6rem;
line-height:1.7;
letter-spacing:1px;
text-shadow:0 3px 10px rgba(0,0,0,0.8);
}

.book{
margin-top:16px;
font-size:0.9rem;
opacity:0.85;
}

/* いいねボタン */

.like{
position:absolute;
right:18px;
bottom:140px;
font-size:28px;
cursor:pointer;
transition:transform 0.2s;
}

.like.liked{
color:#ff2d55;
transform:scale(1.3);
}

/* パーティクル */

.particle{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.2;
border-radius:50%;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:0}
30%{opacity:0.3}
100%{transform:translateY(-800px);opacity:0}
}

</style>
</head>

<body>

<div class="background"></div>

<div class="reel" id="reel">

<img class="cover">

<div class="overlay"></div>

<div class="text">

<div class="phrase"></div>

<div class="book"></div>

</div>

<div class="like">❤</div>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbxgAgU-eGGnxih0eGjPz22EIX1NQddgnAFsbzDOfcyfx6V-dYXiDDmEsPqT3WV0bkyTfA/exec";

let phrases=[]
let index=0
let timer

/* データ取得 */

async function loadData(){

const res=await fetch(GAS_URL)
phrases=await res.json()

showPhrase()

timer=setInterval(nextPhrase,3000)

}

/* 表示 */

function showPhrase(){

const item=phrases[index]

document.querySelector(".cover").src=item.cover

document.querySelector(".background").style.backgroundImage=`url(${item.cover})`

typeText(item.phrase)

document.querySelector(".book").textContent=
`${item.book} / ${item.author}`

}

/* タイプライター */

function typeText(text){

const el=document.querySelector(".phrase")

el.textContent=""

let i=0

function typing(){

if(i<text.length){

el.textContent+=text.charAt(i)

i++

setTimeout(typing,40)

}

}

typing()

}

/* 次 */

function nextPhrase(){

index++

if(index>=phrases.length) index=0

showPhrase()

}

/* スワイプ */

let startY=0

const reel=document.getElementById("reel")

reel.addEventListener("touchstart",e=>{

startY=e.touches[0].clientY

})

reel.addEventListener("touchend",e=>{

let endY=e.changedTouches[0].clientY

if(startY-endY>50){

nextPhrase()

clearInterval(timer)

timer=setInterval(nextPhrase,3000)

}

})

/* いいね */

const like=document.querySelector(".like")

like.addEventListener("click",()=>{

like.classList.toggle("liked")

})

/* パーティクル */

for(let i=0;i<40;i++){

const p=document.createElement("div")

p.className="particle"

p.style.left=Math.random()*100+"%"

p.style.bottom="-10px"

p.style.animationDelay=Math.random()*10+"s"

p.style.animationDuration=(8+Math.random()*10)+"s"

document.body.appendChild(p)

}

loadData()

</script>

</body>
</html>
