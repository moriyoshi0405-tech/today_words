<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Reading Reel</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:black;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Inter',sans-serif;
overflow:hidden;
}

/* 背景 */

.background{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(35px) brightness(0.35);
transform:scale(1.2);
}

/* リール */

.reel{
position:relative;
width:340px;
height:620px;
border-radius:28px;
overflow:hidden;
box-shadow:0 25px 80px rgba(0,0,0,0.6);
}

/* 進行バー */

.progress-container{
position:absolute;
top:10px;
left:12px;
right:12px;
height:3px;
background:rgba(255,255,255,0.25);
border-radius:3px;
overflow:hidden;
z-index:5;
}

.progress{
height:100%;
width:0%;
background:white;
}

/* 表紙 */

.cover{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
animation:zoom 25s ease-in-out infinite alternate;
filter:brightness(0.65);
}

@keyframes zoom{
0%{transform:scale(1)}
100%{transform:scale(1.12)}
}

/* グラデーション */

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(
to top,
rgba(0,0,0,0.85),
rgba(0,0,0,0.35),
rgba(0,0,0,0.25)
);
}

/* テキスト */

.text{
position:absolute;
bottom:140px;
left:28px;
right:28px;
color:white;
}

.phrase{
font-family:'Noto Serif JP',serif;
font-size:26px;
line-height:1.8;
letter-spacing:1px;
text-shadow:0 4px 14px rgba(0,0,0,0.9);
max-height:260px;
overflow:hidden;
}

.book{
margin-top:18px;
font-size:0.95rem;
opacity:0.85;
}

/* 続きを読む */

.readmore{
margin-top:18px;
display:inline-block;
padding:8px 16px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
color:white;
font-size:0.9rem;
text-decoration:none;
transition:0.2s;
}

.readmore:hover{
background:rgba(255,255,255,0.3);
}

/* いいね */

.like{
position:absolute;
right:18px;
bottom:160px;
font-size:30px;
cursor:pointer;
transition:transform 0.2s;
}

.like.liked{
color:#ff2d55;
transform:scale(1.3);
}

</style>
</head>

<body>

<div class="background"></div>

<div class="reel" id="reel">

<div class="progress-container">
<div class="progress"></div>
</div>

<img class="cover">

<div class="overlay"></div>

<div class="text">

<div class="phrase"></div>

<div class="book"></div>

<a class="readmore" target="_blank" style="display:none">
続きを読む →
</a>

</div>

<div class="like">❤</div>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbxgAgU-eGGnxih0eGjPz22EIX1NQddgnAFsbzDOfcyfx6V-dYXiDDmEsPqT3WV0bkyTfA/exec";

let phrases=[]
let index=0

async function loadData(){

const res=await fetch(GAS_URL)
phrases=await res.json()

showPhrase()

}

function showPhrase(){

const item=phrases[index]

document.querySelector(".cover").src=item.cover

document.querySelector(".background").style.backgroundImage=`url(${item.cover})`

typeText(item.phrase)

document.querySelector(".book").textContent=
`${item.book} / ${item.author}`

/* 続きを読む */

const readBtn=document.querySelector(".readmore")

if(item.link){

readBtn.href=item.link
readBtn.style.display="inline-block"

}else{

readBtn.style.display="none"

}

/* 進行バー */

const progress=document.querySelector(".progress")

progress.style.transition="none"
progress.style.width="0%"

setTimeout(()=>{
progress.style.transition="width 6s linear"
progress.style.width="100%"
},50)

}

/* タイピング表示 */

function typeText(text){

const el=document.querySelector(".phrase")

el.textContent=""
el.style.fontSize="26px"

let i=0

function typing(){

if(i<text.length){

el.textContent+=text.charAt(i)

i++

setTimeout(typing,120)

}else{

adjustFontSize()

}

}

typing()

}

/* 文字サイズ自動調整 */

function adjustFontSize(){

const el=document.querySelector(".phrase")

let fontSize=26

while(el.scrollHeight>el.clientHeight && fontSize>16){

fontSize--

el.style.fontSize=fontSize+"px"

}

}

/* 次 */

function nextPhrase(){

index++

if(index>=phrases.length) index=0

showPhrase()

}

/* 前 */

function prevPhrase(){

index--

if(index<0) index=phrases.length-1

showPhrase()

}

/* タップ */

const reel=document.getElementById("reel")

reel.addEventListener("click",(e)=>{

const rect=reel.getBoundingClientRect()

const x=e.clientX-rect.left

if(x>rect.width/2){

nextPhrase()

}else{

prevPhrase()

}

})

/* スワイプ */

let startY=0

reel.addEventListener("touchstart",e=>{
startY=e.touches[0].clientY
})

reel.addEventListener("touchend",e=>{

let endY=e.changedTouches[0].clientY

if(startY-endY>60) nextPhrase()

if(endY-startY>60) prevPhrase()

})

/* いいね */

const like=document.querySelector(".like")

like.addEventListener("click",()=>{

like.classList.toggle("liked")

})

loadData()

</script>

</body>
</html>
