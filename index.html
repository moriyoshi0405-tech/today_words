<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Today's Words</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
font-family:'Poppins',sans-serif;
overflow:hidden;
}

/* 背景 */

.background{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
filter:blur(25px) brightness(0.6);
transform:scale(1.2);
animation:zoomBg 20s ease-in-out infinite alternate;
}

@keyframes zoomBg{
0%{transform:scale(1.2)}
100%{transform:scale(1.35)}
}

/* ガラスカード */

.reel{
position:relative;
width:340px;
height:620px;
border-radius:28px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* 表紙 */

.cover{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
animation:kenburns 18s ease-in-out infinite alternate;
}

@keyframes kenburns{
0%{
transform:scale(1);
}
100%{
transform:scale(1.12);
}
}

/* グラデーション */

.gradient{
position:absolute;
bottom:0;
width:100%;
height:60%;
background:linear-gradient(
transparent,
rgba(0,0,0,0.6)
);
}

/* テキスト */

.text{
position:absolute;
bottom:90px;
left:30px;
right:30px;
color:white;
animation:fadeUp 2s ease;
}

@keyframes fadeUp{
0%{
opacity:0;
transform:translateY(20px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

.phrase{
font-family:'Noto Serif JP',serif;
font-size:1.6rem;
line-height:1.6;
letter-spacing:1px;
margin-bottom:16px;
}

.book{
font-size:0.9rem;
opacity:0.8;
}

/* パーティクル */

.particle{
position:absolute;
width:3px;
height:3px;
background:white;
opacity:0.3;
border-radius:50%;
animation:float 12s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:0;
}
30%{
opacity:0.3;
}
100%{
transform:translateY(-800px);
opacity:0;
}
}

</style>
</head>

<body>

<div class="background"></div>

<div class="reel">

<img class="cover" src="" alt="">

<div class="gradient"></div>

<div class="text">
<div class="phrase">読み込み中...</div>
<div class="book"></div>
</div>

</div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbxgAgU-eGGnxih0eGjPz22EIX1NQddgnAFsbzDOfcyfx6V-dYXiDDmEsPqT3WV0bkyTfA/exec";

async function loadRandomPhrase(){

try{

const response = await fetch(GAS_URL);
const data = await response.json();

if(!data || data.length===0){
document.querySelector(".phrase").textContent="フレーズがありません";
return;
}

const randomItem = data[Math.floor(Math.random()*data.length)];

document.querySelector(".phrase").textContent=randomItem.phrase;

document.querySelector(".book").textContent =
`${randomItem.book} / ${randomItem.author}`;

if(randomItem.cover){

document.querySelector(".cover").src=randomItem.cover;

document.querySelector(".background").style.backgroundImage =
`url(${randomItem.cover})`;

}

}catch(err){

console.error(err);
document.querySelector(".phrase").textContent="読み込みに失敗しました";

}

}

loadRandomPhrase();

/* パーティクル生成 */

for(let i=0;i<30;i++){

const p=document.createElement("div");
p.className="particle";

p.style.left=Math.random()*100+"%";
p.style.bottom="-10px";
p.style.animationDelay=Math.random()*10+"s";
p.style.animationDuration=(8+Math.random()*10)+"s";

document.body.appendChild(p);

}

</script>

</body>
</html>
