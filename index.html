<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Today's Words</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .phrase-card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      padding: 40px 30px;
      max-width: 400px;
      text-align: center;
      position: relative;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .phrase-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.18);
    }

    .phrase {
      font-family: 'Merriweather', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 18px;
      line-height: 1.4;
      letter-spacing: 0.5px;
    }

    .book {
      font-size: 1rem;
      color: #555;
      margin-bottom: 20px;
    }

    img.cover {
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    img.cover:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>

  <div class="phrase-card">
    <div class="phrase">読み込み中...</div>
    <div class="book"></div>
    <img class="cover" src="" alt="" style="display:none;">
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxgAgU-eGGnxih0eGjPz22EIX1NQddgnAFsbzDOfcyfx6V-dYXiDDmEsPqT3WV0bkyTfA/exec";

    async function loadRandomPhrase() {
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();

        if (!data || data.length === 0) {
          document.querySelector(".phrase").textContent = "フレーズがありません";
          return;
        }

        // ランダムで1件抽出
        const randomItem = data[Math.floor(Math.random() * data.length)];

        document.querySelector(".phrase").textContent = randomItem.phrase;
        document.querySelector(".book").textContent = `${randomItem.book} / ${randomItem.author}`;

        if(randomItem.cover) {
          const img = document.querySelector(".cover");
          img.src = randomItem.cover;
          img.style.display = "block";
        }

      } catch (err) {
        console.error(err);
        document.querySelector(".phrase").textContent = "読み込みに失敗しました";
      }
    }

    loadRandomPhrase();
  </script>
</body>
</html>
